name: Quality

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: quality-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run typecheck
      - run: npm run lint
      - run: npm test
      - run: npm run build

  browser-smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npx playwright install --with-deps chromium firefox webkit
      - run: npm run build
      - run: npm run test:e2e
      - name: Upload failure artifacts
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: browser-smoke-artifacts
          path: test-results/
          if-no-files-found: ignore
          retention-days: 14

  performance-guardrails:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npx playwright install --with-deps chromium
      - run: npm run build
      - run: npm run test:performance
      - name: Upload benchmark reports and Playwright artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: performance-artifacts
          path: test-results/
          if-no-files-found: ignore
          retention-days: 14

  collaboration-smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run collaboration:typecheck
      - run: npm run collaboration:test
      - run: npx playwright install --with-deps chromium firefox webkit
      - run: npm run build
        env:
          NEXT_PUBLIC_COLLABORATION_ENABLED: "1"
      - run: npm run test:collaboration
      - name: Upload collaboration failure artifacts
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: collaboration-smoke-artifacts
          path: test-results/
          if-no-files-found: ignore
          retention-days: 14
